// ── Scheduling engine ─────────────────────────────────────────────────────────
function computeSchedule(trades, zones, taktTime, bufferTime) {
  if (!trades.length || !zones.length) return [];
  const stepMap = {};
  let sIdx = 0;
  const visited = new Set();
  for (const t of trades) {
    if (visited.has(t.id)) continue;
    const group = trades.filter(x => x.id===t.id || t.concurrentWith.includes(x.id) || x.concurrentWith.includes(t.id));
    group.forEach(x => { stepMap[x.id] = sIdx; visited.add(x.id); });
    sIdx++;
  }
  const totalSteps = sIdx;
  const stepDuration = {}, stepStart = {}, groupSize = {};
  let cum = 0;
  for (let s=0; s<totalSteps; s++) {
    const inStep = trades.filter(t => stepMap[t.id]===s);
    stepDuration[s] = Math.max(...inStep.map(t=>t.duration));
    groupSize[s] = inStep.length;
    stepStart[s] = cum;
    cum += stepDuration[s] + bufferTime;
  }
  const cells = [];
  trades.forEach(trade => {
    const s = stepMap[trade.id];
    zones.forEach((zone, zi) => {
      const start = stepStart[s] + zi * taktTime;
      cells.push({
        tradeId: trade.id, trade,
        zoneId: zone.id, zone, zoneIdx: zi,
        stepIdx: s,
        startDay: start, endDay: start + trade.duration,
        isConcurrent: groupSize[s] > 1, groupSize: groupSize[s],
      });
    });
  });
  return cells;
}

// ═══════════════════════════════════════════════════════════════════════════════
// SCRUM MASTER VIEW — Takt Sprint Board
//   Shows the takt plan as an agile-style board:
//   • Current sprint (active takt cycle) highlighted
//   • Kanban columns: Backlog | In Progress | Done
//   • Per-trade swim lanes with zone cards showing status
//   • Impediment flag, velocity tracker, WIP gauge, day slider
// ═══════════════════════════════════════════════════════════════════════════════
function ScrumMasterView({ trades, zones, schedule, taktTime, bufferTime,
                           totalDays, projectStartDate, currentDay, setCurrentDay,
                           balanceData }) {

  const { useState: us, useRef: ur, useMemo: um } = React;

  const [scrumLane,    setScrumLane]    = us("trade");  // "trade" | "zone"
  // statusOverrides: { cardKey -> colKey }  — manual drag overrides
  const [overrides,    setOverrides]    = us({});
  const [dragCard,     setDragCard]     = us(null);     // cardKey being dragged
  const [dragOver,     setDragOver]     = us(null);     // colKey being hovered
  const dragRef = ur(null);

  // ── Date helpers ─────────────────────────────────────────────────────────────
  const toDate = (offset) => {
    const d = new Date(projectStartDate + "T00:00:00");
    d.setDate(d.getDate() + Math.floor(offset));
    return d;
  };
  const fmt  = (d) => d.toLocaleDateString("en-GB", { day:"2-digit", month:"short" });
  const fmtS = (d) => d.toLocaleDateString("en-GB", { day:"2-digit", month:"short", year:"2-digit" });

  // ── Auto status (ignores overrides) ──────────────────────────────────────────
  const autoStatus = (cell) => {
    if (!cell) return "none";
    if (currentDay < cell.startDay)       return "backlog";
    if (currentDay >= cell.endDay)        return "done";
    if (cell.endDay - currentDay <= 1.0)  return "at-risk";
    return "in-progress";
  };

  // ── Effective status: override wins ──────────────────────────────────────────
  const cardKey    = (cell) => `${cell.tradeId}-${cell.zoneId}`;
  const getStatus  = (cell) => overrides[cardKey(cell)] || autoStatus(cell);

  // ── Column config ─────────────────────────────────────────────────────────────
  const COLS = [
    { key:"backlog",     label:"Backlog",     icon:"○", color:"#64748B",
      bg:"#0f1520", headerBg:"#1a2235", strip:"#374151",
      noteColors:["#FFF9C4","#FFFDE7","#F5F5DC"] },
    { key:"in-progress", label:"In Progress", icon:"▶", color:"#3A86FF",
      bg:"#061430", headerBg:"#0a1f4a", strip:"#1a3d6e",
      noteColors:["#E3F2FD","#BBDEFB","#C5E8FF"] },
    { key:"at-risk",     label:"At Risk",     icon:"⚠", color:"#F59E0B",
      bg:"#160e00", headerBg:"#261800", strip:"#4a3800",
      noteColors:["#FFF3E0","#FFE0B2","#FFECB3"] },
    { key:"done",        label:"Done",        icon:"✓", color:"#22C55E",
      bg:"#04120a", headerBg:"#071e10", strip:"#10402a",
      noteColors:["#E8F5E9","#C8E6C9","#DCEDC8"] },
  ];

  // ── Sticky note colour per card (deterministic) ───────────────────────────────
  const noteColor = (col, idx) => col.noteColors[idx % col.noteColors.length];

  // ── Slight random rotation for realism (seeded per card) ─────────────────────
  const noteRotation = (key) => {
    let h = 0;
    for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) & 0xffffffff;
    return ((h % 700) - 350) / 100;   // –3.5° to +3.5°
  };

  // ── Build card list ───────────────────────────────────────────────────────────
  const allCards = um(() => {
    if (scrumLane === "trade") {
      // One card per (trade × zone/subzone)
      return schedule.map(cell => {
        const parentZone = cell.zone.parentZone || cell.zone;
        const pzi = cell.zone.parentZoneIdx !== undefined ? cell.zone.parentZoneIdx : 0;
        const zColor = `hsl(${200 + pzi * 22},65%,35%)`;
        return {
          key: cardKey(cell),
          cell,
          title: cell.trade.name,
          sub1:  parentZone.name + (cell.zone.subName ? ` › ${cell.zone.subName}` : ""),
          sub2:  `${fmt(toDate(cell.startDay))} → ${fmt(toDate(cell.endDay))}`,
          accent: cell.trade.color,
          tagColor: zColor,
          tag: parentZone.name.slice(0,8),
        };
      });
    } else {
      // One card per (zone × trade)
      return schedule.map(cell => {
        const parentZone = cell.zone.parentZone || cell.zone;
        const pzi = cell.zone.parentZoneIdx !== undefined ? cell.zone.parentZoneIdx : 0;
        const zColor = `hsl(${200 + pzi * 22},65%,35%)`;
        return {
          key: cardKey(cell),
          cell,
          title: parentZone.name + (cell.zone.subName ? ` › ${cell.zone.subName}` : ""),
          sub1:  cell.trade.name,
          sub2:  `${fmt(toDate(cell.startDay))} → ${fmt(toDate(cell.endDay))}`,
          accent: zColor,
          tagColor: cell.trade.color,
          tag: cell.trade.name.slice(0,8),
        };
      });
    }
  }, [schedule, scrumLane, projectStartDate]);

  // ── Partition cards into columns ──────────────────────────────────────────────
  const colCards = um(() => {
    const map = {};
    COLS.forEach(c => (map[c.key] = []));
    allCards.forEach(card => {
      const st = getStatus(card.cell);
      const col = COLS.find(c => c.key === st) ? st : "backlog";
      map[col].push(card);
    });
    return map;
  }, [allCards, overrides, currentDay]);

  // ── Sprint metrics ────────────────────────────────────────────────────────────
  const currentTakt = Math.floor(currentDay / taktTime) + 1;
  const totalTakts  = Math.ceil(totalDays / taktTime);
  const totalCells  = allCards.length;
  const doneCells   = allCards.filter(c => getStatus(c.cell) === "done").length;
  const activeCells = allCards.filter(c => ["in-progress","at-risk"].includes(getStatus(c.cell))).length;
  const atRiskCells = allCards.filter(c => getStatus(c.cell) === "at-risk").length;
  const overallPct  = totalCells > 0 ? Math.round((doneCells / totalCells) * 100) : 0;

// VIEW A — Trade Flow Map  (Y = trades, X = time, cells = zone labels)
// ═══════════════════════════════════════════════════════════════════════════════
function TaktMapTrade({ trades, zones, schedule, taktTime, totalDays, hoverId, setHoverId }) {
  const PX = 110;  // px per takt unit
  const LH = 52;   // lane height — tall enough for two-line zone/sub-zone label
  const LW = 160;  // label width
  const pxd = PX / taktTime;

  const tradeRow = {};
  trades.forEach((t,i)=>{ tradeRow[t.id]=i; });

  const bracketGroups = {};
  schedule.forEach(c=>{
    if(!c.isConcurrent) return;
    const key=`${c.stepIdx}-${c.zoneIdx}`;
    if(!bracketGroups[key]) bracketGroups[key]=[];
    if(!bracketGroups[key].find(x=>x.tradeId===c.tradeId)) bracketGroups[key].push(c);
  });

  if (!schedule.length) return React.createElement(Empty, null );

  return (
    React.createElement('div', null
      , React.createElement(TradeLegend, { trades: trades, hoverId: hoverId, setHoverId: setHoverId,} )
      , React.createElement('div', { style: { overflowX:"auto",overflowY:"auto",minHeight:"60vh",maxHeight:"76vh" },}
        , React.createElement('div', { style: { position:"relative", minWidth:LW+totalDays*pxd+40 },}
          , React.createElement(DayAxis, { totalDays: totalDays, taktTime: taktTime, pxd: pxd, LW: LW, PX: PX,} )
          , React.createElement(ZoneStripes, { zones: zones, taktTime: taktTime, pxd: pxd, LW: LW,} )
          , trades.map((trade,ti)=>{
            const cells=schedule.filter(c=>c.tradeId===trade.id);
            const dimmed=hoverId!==null&&hoverId!==trade.id;
            return (
              React.createElement('div', { key: trade.id, style: { display:"flex",alignItems:"center",height:LH+6,marginBottom:4 },}
                , React.createElement('div', { style: { width:LW,flexShrink:0,
                  color:dimmed?"#1e2a3a":trade.color,textAlign:"right",paddingRight:10,
                  display:"flex",alignItems:"center",justifyContent:"flex-end",gap:5,
                  transition:"color 0.15s",height:LH },}
                  , React.createElement('div', { style: { overflow:"hidden" },}
                    , React.createElement('div', { style: { fontSize:11,fontWeight:800,whiteSpace:"nowrap",
                      overflow:"hidden",textOverflow:"ellipsis",color:"inherit" },}
                      , trade.name
                    )
                    , React.createElement('div', { style: { fontSize:9,color:dimmed?"#1e2a3a":"#4B5563",whiteSpace:"nowrap" },}
                      , trade.duration, "d · "  , trade.crew, " crew"
                    )
                  )
                  , trade.concurrentWith.length>0 && (
                    React.createElement('span', { style: { color:dimmed?"#1e2a3a":"#4ADE80",fontSize:9,flexShrink:0 },}, "⇄")
                  )
                )
                , React.createElement('div', { style: { position:"relative",flex:1,height:LH },}
                  , cells.map(cell=>{
                    const w=Math.max((cell.endDay-cell.startDay)*pxd-3,14);
                    return (
                      React.createElement(WagonBar, { key: `${cell.tradeId}-${cell.zoneIdx}`,
                        left: cell.startDay*pxd, width: w, height: LH,
                        color: trade.color, dimmed: dimmed,
                        label: cell.zone.parentZone ? cell.zone.parentZone.name : cell.zone.name,
                        labelSub: cell.zone.subName || null,
                        isConcurrent: cell.isConcurrent,
                        tooltip: `${trade.name}\n${cell.zone.parentZone ? cell.zone.parentZone.name : cell.zone.name}${cell.zone.subName ? " › " + cell.zone.subName : ""}\nDay ${cell.startDay.toFixed(1)}–${cell.endDay.toFixed(1)}${cell.isConcurrent?"\n⇄ Concurrent":""}`,
                        onEnter: ()=>setHoverId(trade.id), onLeave: ()=>setHoverId(null),}
                      )
                    );
                  })
                )
              )
            );
          })
          , Object.entries(bracketGroups).map(([key,cells])=>{
            if(cells.length<2) return null;
            const rows=cells.map(c=>tradeRow[c.tradeId]);
            const minR=Math.min(...rows),maxR=Math.max(...rows);
            const sd=Math.min(...cells.map(c=>c.startDay)),ed=Math.max(...cells.map(c=>c.endDay));
            return (
              React.createElement(ConcurrentBracket, { key: key,
                left: LW+sd*pxd, width: (ed-sd)*pxd-3,

            );
          })
        )
      )
    )
  );
}

// VIEW B — Zone Wagon Map  (Y = zone + sub-zones, X = time, cells = trade wagons)
// ═══════════════════════════════════════════════════════════════════════════════
function TaktMapZone({ trades, zones, schedule, taktTime, totalDays, hoverId, setHoverId }) {
  const PX  = 90;    // px per takt unit
  const RH  = 36;    // row height per row
  const LW  = 180;   // label width
  const pxd = PX / taktTime;

  if (!schedule.length) return React.createElement(Empty, null );

  // zones is already flatZones — one entry per sub-zone (or zone if no subs).
  // Group consecutive entries that share the same parentZone for the left-side label.
  const rows = zones.map((z, zi) => {
    const parentZone = z.parentZone || z;
    const parentZoneIdx = z.parentZoneIdx !== undefined ? z.parentZoneIdx : zi;
    const isFirst = zi === 0 || (zones[zi-1].parentZone || zones[zi-1]).id !== parentZone.id;
    const rowCount = zones.filter(fz => (fz.parentZone || fz).id === parentZone.id).length;
    return { zone: z, zoneIdx: zi, sub: z.subName || null, subIdx: z.subIdx !== undefined ? z.subIdx : -1,
             isFirst, rowCount, parentZone, parentZoneIdx };
  });

  // Get all unique stepIdx values (each step = one wagon group)
  const stepIndices = [...new Set(schedule.map(c=>c.stepIdx))].sort((a,b)=>a-b);

  // stepMap: tradeId -> stepIdx
  const tradeStepMap = {};
  schedule.forEach(c=>{ tradeStepMap[c.tradeId]=c.stepIdx; });

  // For each step, get the trades
  const tradesInStep = {};
  stepIndices.forEach(s=>{
    tradesInStep[s] = trades.filter(t=>tradeStepMap[t.id]===s);

  return (
    React.createElement('div', null
      /* Trade legend */
      , React.createElement(TradeLegend, { trades: trades, hoverId: hoverId, setHoverId: setHoverId,} )

          /* Day axis */
          , React.createElement(DayAxis, { totalDays: totalDays, taktTime: taktTime, pxd: pxd, LW: LW, PX: PX,} )

          , React.createElement('div', { style: { position:"absolute", top:22, left:LW, right:0, bottom:0, pointerEvents:"none", zIndex:0 },}

              React.createElement('div', { key: i, style: { position:"absolute", left:i*PX, top:0, bottom:0, width:1, background:i%2===0?"#1a2a3a22":"transparent", borderLeft:"1px dashed #1e2a3a11" },} )

          , rows.map((row, ri) => {
            const { zone, zoneIdx, sub, isFirst, rowCount, parentZone, parentZoneIdx } = row;

            const zoneCells = schedule.filter(c => c.zoneId === zone.id);

            // Group by stepIdx for wagon grouping
            const cellsByStep = {};
            zoneCells.forEach(c => {
              if (!cellsByStep[c.stepIdx]) cellsByStep[c.stepIdx] = [];
              cellsByStep[c.stepIdx].push(c);
            });

            // Colour keyed off parent zone index for consistent colouring per floor/zone
            const pzi = parentZoneIdx !== undefined ? parentZoneIdx : zoneIdx;
            const zoneColor = `hsl(${200+pzi*22},50%,40%)`;
            const rowBg = ri%2===0 ? "rgba(255,255,255,0.012)" : "transparent";

            return (
              React.createElement('div', { key: `${zone.id}-${ri}`, style: { display:"flex", position:"relative",
                height:RH+2, marginBottom:1, background:rowBg },}

                /* Y-axis label: parent zone + sub-zone name */
                , React.createElement('div', { style: { width:LW, flexShrink:0, display:"flex", alignItems:"stretch",
                  borderRight:"1px solid #1e2a3a", position:"relative" },}

                  /* Parent zone label (spans all its sub-zone rows) */
                  , isFirst && (
                    React.createElement('div', { style: {
                      position:"absolute", left:0, top:0,
                      height:(RH+3)*rowCount-1,
                      width:72, display:"flex", alignItems:"center", justifyContent:"center",
                      background:`hsl(${200+pzi*22},25%,10%)`,

                    },}
                      , React.createElement('div', { style: { writingMode:"vertical-rl", transform:"rotate(180deg)",
                        fontSize:11, fontWeight:800, color:zoneColor,

                        , parentZone.name

                  , React.createElement('div', { style: { marginLeft:72, flex:1, display:"flex", alignItems:"center",
                    paddingLeft:8, paddingRight:4,
                    borderBottom: "1px solid #1e2a3a11" },}
                    , sub
                      ? React.createElement('span', { style: { fontSize:10, color:`hsl(${200+pzi*22},50%,55%)`, fontWeight:600, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" },}, sub)
                      : React.createElement('span', { style: { fontSize:10, color:zoneColor, fontStyle:"italic" },}, parentZone.name)

//   Slope = production rate = 1 zone / taktTime days  (all lines parallel if balanced)

function LineOfBalance({ trades, zones, schedule, taktTime, totalDays, hoverId, setHoverId, bufferTime }) {

  const PAD_B   = 48;   // bottom (X-axis)
  const plotW   = W - PAD_L - PAD_R;
  const plotH   = H - PAD_T - PAD_B;

  const nZones  = zones.length;

  // Scaling helpers
  const xScale = d => PAD_L + (d / totalDays) * plotW;

  const yScale = zi => PAD_T + plotH - (zi / Math.max(nZones - 1, 1)) * plotH;

  // Points: bottom-left=(startDay@zone0), top-left=(startDay@zoneN), etc.
  const tradeLines = useMemo(() => {
    return trades.map(trade => {
      const cells = schedule
        .filter(c => c.tradeId === trade.id)
        .sort((a, b) => a.zoneIdx - b.zoneIdx);
      if (!cells.length) return null;

      // Each cell gives us a start/end day at a zone index
      // For the LoB line: plot startDay and endDay as the band edges at each zone row
      const points = cells.map(c => ({
        zi: c.zoneIdx,
        start: c.startDay,
        end: c.endDay,
        duration: c.endDay - c.startDay,
        zone: c.zone,

      const y  = yScale(p.zi);

      return `M ${x1} ${y - h/2} L ${x2} ${y - h/2} L ${x2} ${y + h/2} L ${x1} ${y + h/2} Z`;
    }
    // Start edge: left side of band (start days at each zone)
    // End edge: right side of band (end days at each zone)

    const endEdge   = points.map(p => [xScale(p.end),   yScale(p.zi)]);

    // Band polygon: start-edge top→bottom, then end-edge bottom→top
    const topToBot    = [...startEdge];
    const botToTop    = [...endEdge].reverse();
    const allPts      = [...topToBot, ...botToTop];

  };

        , React.createElement('div', { style: { background:"#0a1520", border:"1px solid #1e3a5a", borderRadius:8, padding:"8px 14px", fontSize:11 },}

  // Status logic (pure function of planned days vs currentDay)

    if (!cell)                               return "none";
    if (currentDay < cell.startDay)          return "not-started";
    if (currentDay >= cell.endDay)           return "complete";
    if (cell.endDay - currentDay <= 1.0)     return "at-risk";

    "in-progress": { label:"In Progress",  bg:"#071838",  border:"#1a3d6e", text:"#60A5FA", dot:"#3A86FF", icon:"▶"  },

    "complete":    { label:"Complete",     bg:"#051610",  border:"#10402a", text:"#4ADE80", dot:"#22C55E", icon:"✓"  },

          , React.createElement('input', { type: "date", value: projectStartDate,

              width:148,boxSizing:"border-box" },} )
        )

        , React.createElement('div', { style: { display:"flex",flexDirection:"column",gap:4,flex:1,minWidth:240 },}

            textTransform:"uppercase",letterSpacing:1 },}, "Simulated \"Today\" — "

            , React.createElement('span', { style: {color:"#374151",marginLeft:8},}, "Day " , currentDay, " / ~"  , Math.ceil(totalDays))
          )

            , React.createElement('input', { type: "range", min: 0, max: Math.ceil(totalDays)+4, step: 1,

            , React.createElement('input', { type: "number", min: 0, value: currentDay,

                padding:"6px 8px",color:"#3A86FF",fontSize:14,fontWeight:800,

        , React.createElement('div', { style: { display:"flex",flexDirection:"column",gap:4 },}

        border:"1px solid #1e2a3a",borderRadius:10 },}
        , React.createElement('div', { style: { minWidth: ZW+SW+trades.length*CW*2+4 },}

                        , cell ? (

                            , React.createElement('div', { style: { fontSize:8,padding:"1px 7px",

              cells.forEach(c=>{const s=getStatus(c);tc[s]=(tc[s]||0)+1;});

                , k==="at-risk"     && "End date ≤ 1 day away. Monitor closely."
                , k==="complete"    && "Work finished on or before planned end."
                , k==="overdue"     && "Past planned end. Work not complete."

// ═══════════════════════════════════════════════════════════════════════════════
// GANTT VIEW — Standard Gantt Chart
//   Y-axis  : One row per trade (task), in execution sequence order
//   X-axis  : Project timeline (day 0 → project end), mapped to real calendar dates
//   Bars    : Each trade spans from its FIRST zone start → LAST zone end
//             (full project-wide duration of that trade across all zones)
//   Features: Precedence arrows, critical path, concurrent brackets,
//             "today" line, per-trade progress, float/slack display

// ═══════════════════════════════════════════════════════════════════════════════
// GANTT VIEW — Standard Gantt with drill-down: Trade → Zone → Sub-zone
//
//  Row hierarchy (collapsible tree):
//    ▼ Trade              ← project span (Zone 1 start → Zone N end)
//        ▼ Zone 1         ← that trade's start/end in Zone 1
//            Sub-zone A   ← inherits the zone's schedule (same timing)
//            Sub-zone B
//        ▼ Zone 2
//            ...
//    ▼ Trade 2 ...
//
//  Features: precedence arrows, critical path, concurrent brackets,
//            "today" line, progress fill, float/slack, hover tooltip,
//            expand/collapse individual trades or all at once

// ═══════════════════════════════════════════════════════════════════════════════
// GANTT VIEW  —  two organisation modes, both with full drill-down
//
//  MODE A  "By Trade"          MODE B  "By Zone"
//  ──────────────────          ─────────────────
//  ▼ Trade                     ▼ Zone
//      ▼ Zone                      ▼ Sub-zone
//          Sub-zone                    ▼ Trade (which trade works here & when)
//
//  Features shared by both modes:
//    precedence arrows · critical path · concurrent brackets
//    today line · progress fill · float/slack · hover tooltip
//    expand / collapse individual rows or all at once
// ═══════════════════════════════════════════════════════════════════════════════
function GanttView({ trades, zones, schedule, taktTime, bufferTime, totalDays,
                     projectStartDate, setProjectStartDate, currentDay, setCurrentDay }) {

  const [ganttMode,    setGanttMode]    = useState("trade"); // "trade" | "zone"
  const [showFloat,    setShowFloat]    = useState(true);
  const [showArrows,   setShowArrows]   = useState(true);
  const [showProgress, setShowProgress] = useState(true);
  const [tooltip,      setTooltip]      = useState(null);

  // ── Expand state for TRADE mode: tradeId, `${tradeId}-${zoneId}` ─────────────
  const [expTrades, setExpTrades] = useState(new Set());
  const [expTZones, setExpTZones] = useState(new Set());

  // ── Expand state for ZONE mode: zoneId, `${zoneId}-${subIdx}`, `${zoneId}-${subIdx}-${tradeId}` ─
  const [expZones,    setExpZones]    = useState(new Set());
  const [expZoneSubs, setExpZoneSubs] = useState(new Set());

  const toggle = (setter, key) =>
    setter(prev => { const n = new Set(prev); n.has(key) ? n.delete(key) : n.add(key); return n; });

  const expandAll = () => {
    if (ganttMode === "trade") {
      setExpTrades(new Set(trades.map(t => t.id)));
      setExpTZones(new Set(trades.flatMap(t => zones.map(z => `${t.id}-${z.id}`))));
    } else {
      // zones is flatZones — group by parentZone id
      const parentIds = [...new Set(zones.map(z => (z.parentZone||z).id))];
      setExpZones(new Set(parentIds));
      setExpZoneSubs(new Set(zones.map((z, zi) => `${(z.parentZone||z).id}-${zi}`)));
    }
  };
  const collapseAll = () => {
    if (ganttMode === "trade") { setExpTrades(new Set()); setExpTZones(new Set()); }
    else { setExpZones(new Set()); setExpZoneSubs(new Set()); }
  };

  // ── Shared derived data ───────────────────────────────────────────────────────
  const { tradeTasks, zoneCellMap, stepGroups } = useMemo(() => {
    if (!schedule.length) return { tradeTasks:[], zoneCellMap:{}, stepGroups:[] };

    const vis = new Set(), sg = [];
    for (const t of trades) {
      if (vis.has(t.id)) continue;
      const g = trades.filter(x => x.id===t.id || t.concurrentWith.includes(x.id) || x.concurrentWith.includes(t.id));
      g.forEach(x => vis.add(x.id));
      sg.push({ group:g, stepIdx:sg.length });
    }

    const zcm = {};
    schedule.forEach(c => { zcm[`${c.tradeId}-${c.zoneId}`] = c; });

    const tt = trades.map((trade, ti) => {
      const cells = schedule.filter(c => c.tradeId === trade.id);
      if (!cells.length) return null;
      const start = Math.min(...cells.map(c => c.startDay));
      const end   = Math.max(...cells.map(c => c.endDay));
      const step  = sg.find(s => s.group.some(t => t.id === trade.id));
      return {
        trade, start, end,
        duration: end - start,
        stepIdx:   step ? step.stepIdx : ti,
        stepGroup: step ? step.group   : [trade],
        isConcurrent: (step ? step.group.length : 1) > 1,
        isCritical: trade.duration >= taktTime,
        float: bufferTime,
      };
    }).filter(Boolean);

    return { tradeTasks:tt, zoneCellMap:zcm, stepGroups:sg };
  }, [trades, zones, schedule, taktTime, bufferTime]);

  // ── MODE A rows: Trade → Flat-zone (sub-zone or whole zone) ────────────────
  const tradeRows = useMemo(() => {
    const out = [];
    tradeTasks.forEach((tt) => {
      out.push({ ...tt, rowType:"trade" });
      if (!expTrades.has(tt.trade.id)) return;

      // zones is flatZones – each entry is already the atomic scheduling unit
      zones.forEach((fz, zi) => {
        const cell = zoneCellMap[`${tt.trade.id}-${fz.id}`];
        if (!cell) return;
        const parentZone = fz.parentZone || fz;
        const pzi = fz.parentZoneIdx !== undefined ? fz.parentZoneIdx : zi;
        const zKey = `${tt.trade.id}-${fz.id}`;
        out.push({
          rowType:"tzone", trade:tt.trade, zone:fz, zoneIdx:pzi,
          displayName: fz.subName ? `${parentZone.name} › ${fz.subName}` : parentZone.name,
          start:cell.startDay, end:cell.endDay, duration:cell.endDay-cell.startDay,
          isCritical:tt.isCritical, isConcurrent:tt.isConcurrent,
          stepGroup:tt.stepGroup, float:bufferTime, cell, zKey, hasSubZones:false,
        });
      });
    });
    return out;
  }, [tradeTasks, zones, zoneCellMap, expTrades, expTZones, bufferTime]);

  // ── MODE B rows: Zone → Sub-zone → Trade ────────────────────────────────────
  // zones is flatZones. We group consecutive entries by parentZone to produce
  // one collapsible "zone" header row, then one "zsub" row per flat unit, then
  // one "ztrade" row per trade per flat unit.
  const zoneRows = useMemo(() => {
    const out = [];

    // Group flatZones by parentZone
    const groups = [];
    zones.forEach((fz, fi) => {
      const pz = fz.parentZone || fz;
      const pzi = fz.parentZoneIdx !== undefined ? fz.parentZoneIdx : fi;
      const last = groups[groups.length - 1];
      if (last && last.parentId === pz.id) {
        last.flatZones.push({ fz, fi });
      } else {
        groups.push({ parentId:pz.id, parentZone:pz, pzi, flatZones:[{ fz, fi }] });
      }
    });

    groups.forEach(({ parentId, parentZone, pzi, flatZones:fzList }) => {
      // All cells across every flat unit in this parent zone
      const allCells = schedule.filter(c => fzList.some(({ fz }) => c.zoneId === fz.id));
      if (!allCells.length) return;
      const zStart = Math.min(...allCells.map(c => c.startDay));
      const zEnd   = Math.max(...allCells.map(c => c.endDay));
      const zColor = `hsl(${200+pzi*22},55%,50%)`;

      out.push({
        rowType:"zone", zone:{ ...parentZone, id:parentId }, zoneIdx:pzi,
        start:zStart, end:zEnd, duration:zEnd-zStart,
        zColor, float:bufferTime,
      });

      if (!expZones.has(parentId)) return;

      fzList.forEach(({ fz, fi }) => {
        const fzCells = schedule.filter(c => c.zoneId === fz.id);
        if (!fzCells.length) return;
        const fzStart = Math.min(...fzCells.map(c => c.startDay));
        const fzEnd   = Math.max(...fzCells.map(c => c.endDay));
        const subKey = `${parentId}-${fi}`;
        const sub = fz.subName || null;

        out.push({
          rowType:"zsub", zone:fz, zoneIdx:pzi, sub, subIdx:fi,
          start:fzStart, end:fzEnd, duration:fzEnd-fzStart,
          zColor, float:bufferTime, subKey,
          displayName: sub ? sub : parentZone.name,
        });

        if (!expZoneSubs.has(subKey)) return;

        fzCells.forEach(cell => {
          const tt = tradeTasks.find(t => t.trade.id === cell.tradeId);
          if (!tt) return;
          out.push({
            rowType:"ztrade", zone:fz, zoneIdx:pzi, sub, subIdx:fi,
            trade:cell.trade, cell,
            start:cell.startDay, end:cell.endDay, duration:cell.endDay-cell.startDay,
            isCritical:tt.isCritical, isConcurrent:tt.isConcurrent,
            stepGroup:tt.stepGroup, zColor, float:bufferTime,
          });
        });
      });
    });

    return out;
  }, [zones, schedule, tradeTasks, zoneCellMap, expZones, expZoneSubs, bufferTime]);

  // Active rows based on mode
  const rows = ganttMode === "trade" ? tradeRows : zoneRows;

  // ── Predecessor links (trade level only, for Mode A arrows) ─────────────────
  const predecessors = useMemo(() => {
    const maxStep = Math.max(...tradeTasks.map(t => t.stepIdx), 0);
    const links = [];
    for (let s=1; s<=maxStep; s++) {
      const prev = tradeTasks.filter(t=>t.stepIdx===s-1);
      const curr = tradeTasks.filter(t=>t.stepIdx===s);
      prev.forEach(p => curr.forEach(c => links.push({ from:p.trade.id, to:c.trade.id })));
    }
    return links;
  }, [tradeTasks]);

  if (!tradeTasks.length) return React.createElement(Empty, null );

  // ── Layout ───────────────────────────────────────────────────────────────────
  const LABEL_W = 224;
  const HEAD_H  = 68;
  const DAY_PX  = 24;
  const CHART_W = Math.ceil(totalDays) * DAY_PX;

  // Row heights by type
  const RH = { trade:44, tzone:34, tsub:26, zone:44, zsub:34, ztrade:28 };
  const BH = { trade:26, tzone:20, tsub:14, zone:26, zsub:20, ztrade:16 };

  const rowY = [];
  let yAcc = HEAD_H;
  rows.forEach(r => { rowY.push(yAcc); yAcc += RH[r.rowType] + 1; });
  const TOTAL_H = yAcc + 12;

  const xd = d => d * DAY_PX;
  const yr = i => rowY[i] + RH[rows[i].rowType] / 2;

  const tickInterval = totalDays<=20?1:totalDays<=60?5:7;
  const ticks = [];
  for (let d=0; d<=Math.ceil(totalDays); d+=tickInterval) ticks.push(d);

  const toDate = d => {
    const dt = new Date(projectStartDate + "T00:00:00");
    dt.setDate(dt.getDate() + Math.floor(d));
    return dt.toLocaleDateString("en-GB", { day:"2-digit", month:"short" });
  };

  const getStatus = (start, end) => {
    if (currentDay < start)      return "not-started";
    if (currentDay >= end)       return "complete";
    if (end - currentDay <= 1)   return "at-risk";
    return "in-progress";
  };
  const SDOT = { "not-started":"#374151","in-progress":"#3A86FF","at-risk":"#F59E0B","complete":"#22C55E" };

  // trade row index map for arrows
  const tradeRowIdx = {};
  rows.forEach((r,i) => { if(r.rowType==="trade") tradeRowIdx[r.trade.id]=i; });

  // Indentation (px) per row type
  const INDENT = { trade:0, tzone:14, tsub:28, zone:0, zsub:14, ztrade:28 };

  // Can a row be expanded?
  const canExpand = r => {
    if (ganttMode==="trade") {
      if (r.rowType==="trade") return true;
      if (r.rowType==="tzone") return r.hasSubZones;
    } else {
      if (r.rowType==="zone") return true;
      if (r.rowType==="zsub") {
        // has trade children
        const zoneCells = schedule.filter(c => c.zoneId === r.zone.id);
        return zoneCells.length > 0;
      }
    }
    return false;
  };

  const isExpanded = r => {
    if (ganttMode==="trade") {
      if (r.rowType==="trade") return expTrades.has(r.trade.id);
      if (r.rowType==="tzone") return expTZones.has(r.zKey);
    } else {
      if (r.rowType==="zone") return expZones.has(r.zone.id);
      if (r.rowType==="zsub") return expZoneSubs.has(r.subKey);
    }
    return false;
  };

  const handleToggle = r => {
    if (ganttMode==="trade") {
      if (r.rowType==="trade") toggle(setExpTrades, r.trade.id);
      if (r.rowType==="tzone") toggle(setExpTZones, r.zKey);
    } else {
      if (r.rowType==="zone") toggle(setExpZones, r.zone.id);
      if (r.rowType==="zsub") toggle(setExpZoneSubs, r.subKey);
    }
  };

  // ── Label for each row type ───────────────────────────────────────────────────
  const RowLabel = ({ row, pct, dotC, showProgress }) => {
    const rh = RH[row.rowType];
    switch (row.rowType) {
      case "trade": return (
        React.createElement(React.Fragment, null
          , React.createElement('div', { style: { display:"flex",alignItems:"center",gap:6 },}
            , React.createElement('div', { style: { width:8,height:8,borderRadius:"50%",background:row.trade.color,flexShrink:0 },})
            , React.createElement('div', { style: { fontSize:11,fontWeight:800,color:row.trade.color,
              whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" },}
              , row.trade.name
            )
          )
          , React.createElement('div', { style: { fontSize:9,color:"#4B5563",marginTop:1 },}
            , row.trade.duration, "d/zone · "  , row.trade.crew, " crew"
            , row.isConcurrent&&React.createElement('span', { style: {color:"#4ADE80",marginLeft:4},}, "⇄")
          )
          , showProgress&&pct>0&&(
            React.createElement('div', { style: { height:2,background:"#1e2a3a",borderRadius:1,marginTop:3,overflow:"hidden" },}
              , React.createElement('div', { style: { height:"100%",width:`${pct}%`,background:dotC,borderRadius:1 },})
            )
          )
        )
      );
      case "tzone": return (
        React.createElement(React.Fragment, null
          , React.createElement('div', { style: { fontSize:10,fontWeight:700,color:`hsl(${200+row.zoneIdx*22},60%,60%)`,
            whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" },}
            , row.displayName || row.zone.name
          )
          , React.createElement('div', { style: { fontSize:8,color:"#374151" },}
            , toDate(row.start), " → "  , toDate(row.end)
          )
        )
      );
      case "tsub": return (
        React.createElement('div', { style: { fontSize:9,fontWeight:600,
          color:`hsl(${200+row.zoneIdx*22},50%,55%)`,
          whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" },}
          , row.sub
        )
      );
      case "zone": return (
        React.createElement(React.Fragment, null
          , React.createElement('div', { style: { display:"flex",alignItems:"center",gap:6 },}
            , React.createElement('div', { style: { width:8,height:8,borderRadius:"50%",
              background:row.zColor,flexShrink:0 },})
            , React.createElement('div', { style: { fontSize:11,fontWeight:800,color:row.zColor,
              whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" },}
              , row.zone.name
            )
          )
          , React.createElement('div', { style: { fontSize:9,color:"#4B5563",marginTop:1 },}
            , schedule.filter(c=>(c.zone.parentZone||c.zone).id===row.zone.id||c.zoneId===row.zone.id).length, " trade cells"
          )
        )
      );
      case "zsub": return (
        React.createElement(React.Fragment, null
          , React.createElement('div', { style: { fontSize:10,fontWeight:700,
            color:`hsl(${200+row.zoneIdx*22},55%,58%)`,
            whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" },}
            , row.displayName || row.sub || row.zone.name
          )
          , React.createElement('div', { style: { fontSize:8,color:"#374151" },}
            , toDate(row.start), " → "  , toDate(row.end)

// STEP 4 — Full Rebalancing Engine
//
//  Eight Lean Construction strategies to achieve takt balance:
//   1. Add Manpower         — more workers, same scope, shorter duration
//   2. Adjust Takt Time     — change rhythm to match the slowest trade
//   3. Concurrent Work      — run two trades in the same zone simultaneously
//   4. Zone Splitting       — split a zone into sub-zones to parallelise
//   5. Pre-fabrication      — move scope off-site to reduce on-site content
//   6. Technology Upgrade   — faster methods / tools to improve productivity
//   7. Scope Transfer       — shift activities to a lightweight finishing wave
//   8. Redeploy Workers     — move idle crew to bottleneck trades
//
//  Tabs: ① Analysis · ② Recommendations · ③ Rebalance · ④ Manpower Summary

// ═══════════════════════════════════════════════════════════════════════════════

//   ④ Rebalance Trades  — manual slider fine-tuning
//   ⑤ Manpower Summary  — crew impact table & action plan

//  Strategy selection is per-trade. Once at least one strategy is selected,
//  the Simulation tab becomes active and shows the projected schedule.
//  "Apply to Plan" commits the simulation into the live trade data.

//
//  Graphically demonstrates how increasing zone count reduces lead time.
//  Shows a live animated takt diagram with:
//    - Adjustable zone count slider (2 – 20)

// LITTLE'S LAW — ZONE SPLITTING DIAGRAM
//
//  Three-panel interactive graphic demonstrating how more zones = less lead time:
//
//  Panel A  (left)  — "Few Zones"  takt diagram  (fixed at currentZones)
//  Panel B  (right) — "More Zones" takt diagram  (adjustable via slider)
//  Panel C  (bottom)— Lead-time curve: zones on X axis, days on Y axis
//
//  Key visualisations per takt panel:
//    • Diagonal trade bars (each zone offset by taktTime to the right)
//    • Zone-1 lead time bracket (purple vertical span)
//    • Total programme end line (green dashed)
//    • "Last zone completes" annotation
//    • Zone columns highlighted with alternating shade
//
//  Little's Law formula panel updates live with real numbers.

// ─────────────────────────────────────────────────────────────────────────────

// Shows side-by-side takt panels + Before/After table + Recharts curve
// No nested component definitions — all rendering is inline
// ─────────────────────────────────────────────────────────────────────────────
function LittlesLawDiagram({ trades, taktTime: taktTimeRaw, bufferTime: bufferTimeRaw, currentZones: currentZonesRaw }) {
  // Safety guards — use renamed params to avoid reassignment in strict mode
  const taktTime    = Math.max(taktTimeRaw,    0.1);
  const bufferTime  = Math.max(bufferTimeRaw,  0);
  const currentZones = Math.max(currentZonesRaw, 1);
  const [moreZones, setMoreZones] = useState(Math.min(currentZonesRaw * 2, 16));
  const [hoveredZone, setHoveredZone] = useState(null);

  // ── Pick up to 4 display trades ───────────────────────────────────────────
  const dTrades = trades.slice(0, Math.min(4, trades.length)).length > 0
    ? trades.slice(0, Math.min(4, trades.length))
    : [
        { id:1, name:"Trade A", duration:taktTime, color:"#3A86FF" },
        { id:2, name:"Trade B", duration:taktTime, color:"#FF9F1C" },
        { id:3, name:"Trade C", duration:taktTime, color:"#2EC4B6" },
      ];

function PlanRecommendations({ trades, zones, taktTime, bufferTime, totalDays,
                               schedule, overloaded, idle, balanced, concurrentPairs }) {

  const [activeCategory, setActiveCategory] = useState("leadtime");
  const [expandedRec, setExpandedRec]       = useState(null);

  // ── Core metrics ─────────────────────────────────────────────────────────────
  const nZones      = zones.length;
  const nTrades     = trades.length;
  const nSteps      = useMemo(() => {
    const visited = new Set(); let s = 0;
    for (const t of trades) {
      if (visited.has(t.id)) continue;
      const g = trades.filter(x => x.id===t.id || t.concurrentWith.includes(x.id) || x.concurrentWith.includes(t.id));
      g.forEach(x => visited.add(x.id)); s++;
    }
    return s;
  }, [trades]);

  const totalBufferDays   = bufferTime * (nSteps - 1);
  const totalWorkDays     = totalDays - totalBufferDays;
  const bufferPct         = totalDays > 0 ? Math.round((totalBufferDays/totalDays)*100) : 0;
  const maxTradeDur       = Math.max(...trades.map(t=>t.duration), 1);
  const avgTradeDur       = trades.length > 0 ? (trades.reduce((s,t)=>s+t.duration,0)/trades.length) : 0;
  const totalCrewOnSite   = trades.reduce((s,t)=>s+t.crew,0);
  const totalWorkContent  = trades.reduce((s,t)=>s+t.crew*t.duration,0); // crew-days per zone

  // Little's Law: Lead Time = WIP × Cycle Time
  // In takt: LT ≈ nZones × taktTime + (nSteps-1)×(maxStepDur + buffer)
  // Simplification: adding more smaller zones reduces per-zone WIP
  // Cycle time per zone = taktTime (steady-state)
  // WIP = number of active zones at any moment ≈ nSteps (one per trade step)
  const littlesWIP        = nSteps;  // average zones in progress simultaneously
  const littlesCycleTime  = maxTradeDur > 0 ? maxTradeDur : taktTime;
  const littlesLeadTime   = littlesWIP * littlesCycleTime;

  // Flow efficiency = productive time / total time
  const flowEfficiency    = totalDays > 0 ? Math.round((totalWorkDays/totalDays)*100) : 0;

  // Bottleneck severity
  const bottleneckSeverity = overloaded.length > 0
    ? Math.max(...overloaded.map(t => t.duration - taktTime))
    : 0;

  // Concurrent opportunity: non-concurrent overloaded trades that could be paired
  const unpairedTrades = trades.filter(t =>
    t.concurrentWith.length === 0 &&
    trades.some(o => o.id !== t.id && o.concurrentWith.length === 0)
  );

  // ── What-if simulations ──────────────────────────────────────────────────────

  // Sim 1: Zone splitting (Little's Law) — double the zones, halve zone size
  // Lead time ≈ (nZones × taktTime) + (nSteps-1) × (maxDur + buffer)
  // With 2× zones and halved taktTime → same WIP span but faster individual zone
  const simDoubleZones = () => {
    const newN    = nZones * 2;
    const newTakt = taktTime / 2;
    // Each step duration stays same (work content per sub-zone halved + double crew OR same crew slower)
    // Optimistic: same crew split across 2 sub-zones simultaneously
    const newTotal = nSteps * (maxTradeDur + bufferTime) + (newN/2 - 1) * newTakt;
    const saving   = totalDays - newTotal;
    return { newN, newTakt: +newTakt.toFixed(1), newTotal: +newTotal.toFixed(0), saving: +saving.toFixed(0) };
  };

  // Sim 2: Halve buffer time
  const simHalfBuffer = () => {
    const newBuf   = bufferTime / 2;
    const newTotal = totalWorkDays + newBuf * (nSteps - 1);
    const saving   = totalDays - newTotal;
    return { newBuf: +newBuf.toFixed(1), newTotal: +newTotal.toFixed(0), saving: +saving.toFixed(0) };
  };

  // Sim 3: Eliminate all overloaded trades (set to taktTime)
  const simFixBottlenecks = () => {
    if (!overloaded.length) return null;
    const newMaxDur = Math.max(...trades.map(t =>
      t.duration > taktTime ? taktTime : t.duration
    ));
    const newTotal  = nSteps * (newMaxDur + bufferTime) + (nZones - 1) * taktTime;
    const saving    = totalDays - newTotal;
    return { newMaxDur: +newMaxDur.toFixed(1), newTotal: +newTotal.toFixed(0), saving: +saving.toFixed(0) };
  };

  // Sim 4: Add one more concurrent pair (save one step)
  const simAddConcurrent = () => {
    if (unpairedTrades.length < 2) return null;
    const newSteps  = nSteps - 1;
    const newTotal  = newSteps * (maxTradeDur + bufferTime) + (nZones - 1) * taktTime;
    const saving    = totalDays - newTotal;
    return { newSteps, newTotal: +newTotal.toFixed(0), saving: +saving.toFixed(0) };
  };

  // Sim 5: Reduce takt time by 20%
  const simReduceTakt = () => {
    const newTakt  = +(taktTime * 0.8).toFixed(1);
    const newTotal = nSteps * (maxTradeDur + bufferTime) + (nZones - 1) * newTakt;
    const saving   = totalDays - newTotal;
    return { newTakt, newTotal: +newTotal.toFixed(0), saving: +saving.toFixed(0) };
  };

    const base    = nSteps * (maxTradeDur + bufferTime);
    const n       = Math.round((targetDays - base) / taktTime + 1);
    return Math.max(n, nSteps);
  };

// ── Flow Diagram ──────────────────────────────────────────────────────────────
function FlowDiagram({ trades }) {
  const visited=new Set(), steps=[];
  for (const t of trades) {
    if(visited.has(t.id)) continue;
    const g=trades.filter(x=>x.id===t.id||t.concurrentWith.includes(x.id)||x.concurrentWith.includes(t.id));
    g.forEach(x=>visited.add(x.id)); steps.push(g);
  }
  return (
    React.createElement('div', { style: { display:"flex",alignItems:"center",flexWrap:"wrap",gap:0 },}
      , steps.map((g,si)=>(
        React.createElement('div', { key: si, style: { display:"flex",alignItems:"center" },}
          , React.createElement('div', { style: { display:"flex",flexDirection:g.length>1?"column":"row",gap:5 },}
            , g.map(t=>(
              React.createElement('div', { key: t.id, style: { padding:"8px 13px",background:`${t.color}14`,border:`1.5px solid ${t.color}44`,borderLeft:`3px solid ${t.color}`,borderRadius:8,minWidth:115 },}
                , React.createElement('div', { style: { fontWeight:700,fontSize:11,color:t.color },}, t.name)
                , React.createElement('div', { style: { fontSize:10,color:"#4B5563" },}, t.duration, "d · "  , t.crew, " crew" )
                , g.length>1&&React.createElement('div', { style: { fontSize:9,color:"#4ADE80",marginTop:2 },}, "⇄ concurrent" )
              )
            ))
            , g.length>1&&React.createElement('div', { style: { fontSize:9,color:"#4ADE80",textAlign:"center",marginTop:1 },}, "↕ share zone"  )
          )
          , si<steps.length-1&&React.createElement('span', { style: { fontSize:18,color:"#3A86FF",padding:"0 5px" },}, "→")
        )
      ))
    )
  );
}
